version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: smart_pcrm_db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: smart_pcrm
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build: .
    container_name: smart_pcrm_backend
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://mongodb:27017
      JWT_SECRET: your_super_secret_jwt_key_change_in_production
      JWT_ALGORITHM: HS256
      ML_SERVICE_URL: http://ml_service:8001
      DEBUG: "True"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - .:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongo_data:
    driver: local

networks:
  default:
    driver: bridge
